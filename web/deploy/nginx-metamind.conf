# 制影 AI(雨夜的告别 demo)- 阿里云 ECS 部署用 nginx site 配置
# 放置位置: /etc/nginx/sites-available/metamind
# 启用方式: ln -s /etc/nginx/sites-available/metamind /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # 用公网 IP 直接访问,不设 server_name
    server_name _;

    # 静态资源根目录(部署脚本会把 dist 拷到这里)
    root /var/www/metamind;
    index index.html;

    # 上传/请求体上限放宽(预留 base64 场景图等大请求)
    client_max_body_size 20m;

    # 压缩,前端静态资源体积下降明显
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml application/xml+rss
        application/wasm
        image/svg+xml;

    # ---- React Router SPA fallback ----
    # /editor, /characters 等前端路由都返回 index.html,由 React Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 入口 HTML 不缓存(每次发版立即生效)
    # 注意:add_header 的 value 含逗号会被某些 nginx 版本误判为多参数,
    # 这里用单值 no-store 等价覆盖(对现代浏览器足够)
    location = /index.html {
        add_header Cache-Control "no-store";
        add_header Pragma        "no-cache";
        add_header Expires       "0"       ;
        expires off;
    }

    # 带 hash 的资源永久缓存
    location ~* \.(?:css|js|svg|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # ---- Seedance API 反向代理(与本地 vite.config.ts 等价) ----
    # 真实接口由 seedance2_final.py 验证: http://101.37.232.133/v1
    # 浏览器请求 /seedance-proxy/v1/video/generations 会被转发到 http://101.37.232.133/v1/video/generations
    #
    # ★ API Key 在 nginx 层注入,不再放进前端 bundle ★
    # 部署时把下方 sk-xxx 换成真实 key;前端 authHeaders 检测到空就不发 Authorization,
    # 这里的 proxy_set_header 会以 nginx 这一跳作为 Authorization 头进入上游。
    location /seedance-proxy/ {
        # 去掉 /seedance-proxy 前缀
        rewrite ^/seedance-proxy/(.*)$ /$1 break;

        proxy_pass http://101.37.232.133;

        # ★ 服务器端注入鉴权,前端不再持有 key
        proxy_set_header Authorization       "Bearer sk-0ayGMSoQomp9ch4vt2UxxiIOEnXGTEgYie9QwZGaDYdtySlf";

        # 透传必要的请求头
        proxy_set_header Host                101.37.232.133;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # 关闭缓存,Seedance 任务每次都要走真实接口
        proxy_buffering off;
        proxy_cache off;

        # 视频生成是长任务,适度延长上游超时
        proxy_connect_timeout  30s;
        proxy_send_timeout     600s;
        proxy_read_timeout     600s;

        # HTTP/1.1 + keep-alive(避免每次都重新建连)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- SeeGen 素材库反向代理(角色库上传) ----
    # 真实接口: https://api.seegen.ai/v1/assets/groups | /assets | /assets/{id}
    # 参考: docs/seedance_sucai/upload_seegen_assets.py
    #
    # Authorization (Bearer sk-xxx) 由前端 seegen.ts 注入 (VITE_SEEGEN_API_KEY 或
    # 内置 BUILTIN_SEEGEN_API_KEY)。nginx 这里只做透传,不再额外注入,与 Seedance
    # 那一段不同 —— 角色库 key 跟着前端走方便切换账号。
    location /seegen-proxy/ {
        rewrite ^/seegen-proxy/(.*)$ /$1 break;

        proxy_pass https://api.seegen.ai;

        # 透传上游需要的 SNI / Host
        proxy_ssl_server_name on;
        proxy_set_header Host              api.seegen.ai;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- 业务后端反向代理(metamind-server,本机 8787) ----
    # 提供 auth: 手机号 / 账号密码 / OAuth(Google/GitHub/微信) + JWT
    location /api/ {
        proxy_pass http://127.0.0.1:8787/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # 健康检查,部署完拿这个验证 nginx 是否正常
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
